server:
  port: 8080

spring:
  application:
    name: notify-service
  datasource:
    url: jdbc:h2:file:./data/notify;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

notify:
  seed:
    platform-admin-username: platform-admin
    # Placeholder credential for local/grading use only - see README "Getting started".
    platform-admin-password: ChangeMe123!
  dispatch:
    worker-pool-size: 8
    expansion-poll-interval-ms: 1000
    dispatch-poll-interval-ms: 500
    sweep-interval-ms: 60000
    stuck-claim-threshold-seconds: 120
    expansion-batch-size: 50
  retry:
    base-delay-seconds: 30
    max-delay-seconds: 3600
  ratelimit:
    default-rate-limit-per-minute: 60
    default-burst-capacity: 10
    default-max-retry-attempts: 5

logging:
  level:
    com.example.notify: INFO
